<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>9o7chat</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:#000;color:#fff;overflow:hidden}
::-webkit-scrollbar{width:0}

/* ── VARS ── */
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#1a1a1a;--s4:#222;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.06);
  --acc:#e040fb;--acc2:#aa00ff;--acc3:rgba(224,64,251,.15);
  --blue:#2196f3;--green:#4caf50;--red:#f44336;--orange:#ff9800;
  --t1:#fff;--t2:#aaa;--t3:#555;--t4:#333;
  --r:12px;--font:'Tajawal',sans-serif;
}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.lo-logo{font-size:36px;font-weight:900;letter-spacing:-1px}
.lo-logo span{color:var(--acc)}
.lo-ring{width:40px;height:40px;border:3px solid var(--s3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH ── */
#auth{position:fixed;inset:0;z-index:800;background:#000;display:none;overflow-y:auto}
.auth-wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{width:100%;max-width:400px;padding:0 0 40px}
.auth-logo{text-align:center;padding:40px 0 32px;font-size:32px;font-weight:900;letter-spacing:-1px}
.auth-logo span{color:var(--acc)}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.auth-tab{flex:1;padding:12px;background:none;border:none;font-family:var(--font);font-size:15px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.auth-tab.on{color:var(--t1);border-bottom-color:var(--acc)}
.aform{display:flex;flex-direction:column;gap:14px}
.aform.hide{display:none}
.af-lbl{font-size:13px;color:var(--t2);margin-bottom:4px;display:block}
.af-inp{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s}
.af-inp:focus{border-color:var(--acc)}
.af-inp::placeholder{color:var(--t3)}
.af-hint{font-size:12px;color:var(--t3);margin-top:3px}
.af-err{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);display:none}
.af-err.show{display:block}
.btn-main{padding:14px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.btn-main:hover{background:var(--acc2)}
.btn-main:active{transform:scale(.97)}
.btn-main:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{padding:12px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--t2);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .2s;width:100%}
.btn-ghost:hover{background:var(--s2);color:var(--t1)}

/* ── APP SHELL ── */
#app{display:none;width:100vw;height:100vh;position:relative;overflow:hidden}

/* ── BOTTOM NAV ── */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,.9);backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  display:flex;align-items:center;height:60px;padding:0 8px;
  safe-area-inset-bottom:env(safe-area-inset-bottom);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px;border-radius:10px;transition:all .15s;position:relative}
.nav-btn:active{transform:scale(.9)}
.nav-ico{font-size:22px;transition:all .2s;filter:grayscale(1) opacity(.5)}
.nav-btn.on .nav-ico{filter:none}
.nav-lbl{font-size:10px;color:var(--t3);font-weight:600;transition:color .2s}
.nav-btn.on .nav-lbl{color:var(--acc)}
.nav-badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:16px;height:16px;background:var(--red);border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #000}

/* ── PAGES ── */
.page{position:absolute;inset:0;bottom:60px;overflow-y:auto;display:none;background:#000}
.page.on{display:block}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);padding:12px 16px;display:flex;align-items:center;gap:12px}
.topbar-title{font-size:20px;font-weight:900;flex:1;letter-spacing:-.5px}
.topbar-title span{color:var(--acc)}
.ico-btn{width:36px;height:36px;border-radius:50%;background:var(--s2);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t1);transition:all .15s;flex-shrink:0}
.ico-btn:active{transform:scale(.9)}

/* ══════════════════════════════════
   HOME — STORIES + FEED
══════════════════════════════════ */
#page-home{}
.stories-bar{display:flex;gap:10px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border2)}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.story-av{width:58px;height:58px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);flex-shrink:0}
.story-av.seen{background:var(--s3)}
.story-av-in{width:100%;height:100%;border-radius:50%;background:var(--s2);border:2px solid #000;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.story-nm{font-size:11px;color:var(--t2);max-width:60px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.story-add{width:58px;height:58px;border-radius:50%;background:var(--s2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--acc);cursor:pointer;flex-shrink:0}

/* POST CARD */
.post{border-bottom:1px solid var(--border2);padding-bottom:4px;margin-bottom:0}
.post-head{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.post-av{width:38px;height:38px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;cursor:pointer;flex-shrink:0}
.post-av.has-story{outline:2px solid var(--acc);outline-offset:2px}
.post-meta{flex:1;min-width:0}
.post-name{font-size:14px;font-weight:700;cursor:pointer}
.post-name:hover{text-decoration:underline}
.post-sub{font-size:12px;color:var(--t3)}
.post-more{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px 8px}
.post-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--s2)}
.post-img-placeholder{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--s2),var(--s3));display:flex;align-items:center;justify-content:center;font-size:60px}
.post-actions{display:flex;align-items:center;gap:4px;padding:10px 14px 6px}
.post-act{background:none;border:none;display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 8px;border-radius:8px;transition:all .15s;font-size:13px;color:var(--t2)}
.post-act:active{transform:scale(.9)}
.post-act svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;transition:all .2s}
.post-act.liked svg{stroke:var(--red);fill:var(--red);color:var(--red)}
.post-act.liked{color:var(--red)}
.post-act.saved svg{fill:var(--t1);stroke:var(--t1)}
.post-save{margin-right:auto}
.post-likes{padding:0 14px;font-size:13px;font-weight:700;margin-bottom:4px}
.post-caption{padding:0 14px 8px;font-size:14px;line-height:1.5}
.post-caption b{font-weight:700;cursor:pointer}
.post-caption b:hover{text-decoration:underline}
.post-comments-link{padding:0 14px 8px;font-size:13px;color:var(--t3);cursor:pointer}
.post-time{padding:0 14px 10px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.add-comment{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:1px solid var(--border2)}
.comment-av{width:28px;height:28px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.comment-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--t1);padding:4px 0}
.comment-inp::placeholder{color:var(--t3)}
.comment-send{background:none;border:none;color:var(--acc);font-size:13px;font-weight:700;cursor:pointer}

/* ══════════════════════════════════
   SEARCH PAGE
══════════════════════════════════ */
#page-search .search-bar{padding:10px 14px;position:sticky;top:0;z-index:10;background:#000}
.search-input-wrap{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.search-input-wrap svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0}
.search-input-wrap input{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:15px;color:var(--t1)}
.search-input-wrap input::placeholder{color:var(--t3)}
.search-results{padding:0}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.user-row:active{background:var(--s2)}
.user-row-av{width:48px;height:48px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.user-row-info{flex:1;min-width:0}
.user-row-name{font-size:15px;font-weight:700}
.user-row-handle{font-size:13px;color:var(--t3)}
.user-row-action{flex-shrink:0}
.follow-btn{padding:7px 16px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:none}
.follow-btn.follow{background:var(--acc);color:#fff}
.follow-btn.following{background:var(--s3);color:var(--t2);border:1px solid var(--border)}
.follow-btn:active{transform:scale(.95)}

/* ══════════════════════════════════
   POST PAGE
══════════════════════════════════ */
#page-post{background:#000}
.post-page-inner{padding-bottom:80px}
.new-post-area{padding:16px}
.new-post-img-pick{width:100%;aspect-ratio:16/9;background:var(--s2);border:2px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-size:14px;color:var(--t3);overflow:hidden;position:relative}
.new-post-img-pick img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.new-post-img-pick .pick-label{position:relative;z-index:1;background:rgba(0,0,0,.5);padding:8px 16px;border-radius:8px}
.new-post-caption{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-family:var(--font);font-size:15px;outline:none;resize:none;min-height:80px;margin-top:12px;transition:border-color .2s}
.new-post-caption:focus{border-color:var(--acc)}
.new-post-caption::placeholder{color:var(--t3)}

/* ══════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════ */
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.notif-item:active{background:var(--s2)}
.notif-item.unread{background:rgba(224,64,251,.04)}
.notif-av{width:44px;height:44px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-text{font-size:14px;line-height:1.4}
.notif-text b{font-weight:700}
.notif-time{font-size:11px;color:var(--t3);margin-top:2px}
.notif-thumb{width:44px;height:44px;border-radius:6px;background:var(--s3);background-size:cover;background-position:center;flex-shrink:0}

/* ══════════════════════════════════
   PROFILE PAGE
══════════════════════════════════ */
#page-profile{}
.profile-cover{height:120px;background:linear-gradient(135deg,var(--s3),var(--s4));position:relative;overflow:hidden}
.profile-cover-grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(224,64,251,.2),rgba(33,150,243,.1))}
.profile-av-wrap{padding:0 16px;margin-top:-38px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.profile-av-big{width:78px;height:78px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;border:3px solid #000;cursor:pointer;flex-shrink:0}
.profile-av-big:active{opacity:.85}
.profile-edit-btn{padding:8px 20px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.profile-edit-btn:active{background:var(--s2)}
.profile-info{padding:0 16px 16px;border-bottom:1px solid var(--border2)}
.profile-name{font-size:20px;font-weight:900;margin-bottom:2px;letter-spacing:-.5px}
.profile-handle{font-size:14px;color:var(--t3);margin-bottom:8px}
.profile-handle::before{content:'@'}
.profile-bio{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:12px;white-space:pre-wrap}
.profile-stats{display:flex;gap:0}
.pstat{flex:1;text-align:center;cursor:pointer;padding:6px 0;border-radius:8px;transition:background .15s}
.pstat:active{background:var(--s2)}
.pstat-n{font-size:20px;font-weight:900}
.pstat-l{font-size:12px;color:var(--t3);margin-top:1px}
.profile-follow-btn{width:100%;padding:11px;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;border:none;margin:14px 0 0}
.profile-follow-btn.follow{background:var(--acc);color:#fff}
.profile-follow-btn.following{background:var(--s3);color:var(--t1);border:1px solid var(--border)}
.profile-msg-btn{width:100%;padding:11px;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--s2);border:1px solid var(--border);color:var(--t1);margin:8px 0 0}
.profile-posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding-top:2px}
.grid-post{aspect-ratio:1;background:var(--s2);background-size:cover;background-position:center;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.grid-post:active{opacity:.8}
.grid-post img{width:100%;height:100%;object-fit:cover;display:block}

/* Edit profile modal */
.edit-prf-form{display:flex;flex-direction:column;gap:14px;padding:20px}
.color-palette{display:flex;gap:10px;flex-wrap:wrap}
.c-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.c-dot:active{transform:scale(1.2)}
.c-dot.on{border-color:#fff}

/* ══════════════════════════════════
   DM — MESSAGES
══════════════════════════════════ */
#page-msgs{}
.msgs-list{padding:0}
.dm-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border2)}
.dm-row:active{background:var(--s2)}
.dm-row.unread .dm-prev{color:var(--t1);font-weight:600}
.dm-av{width:50px;height:50px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.dm-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--green);border-radius:50%;border:2px solid #000}
.dm-body{flex:1;min-width:0}
.dm-name{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-prev{font-size:13px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.dm-time{font-size:11px;color:var(--t3)}
.dm-badge{min-width:18px;height:18px;background:var(--acc);border-radius:9px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ── CHAT VIEW ── */
#chat-view{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#chat-view.open{display:flex;transform:translateX(0)}
.chat-topbar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);flex-shrink:0}
.chat-av{width:36px;height:36px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.chat-info{flex:1;min-width:0;cursor:pointer}
.chat-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-status{font-size:12px;color:var(--green)}
.chat-status.off{color:var(--t3)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-row.out{flex-direction:row-reverse}
.msg-row.cont .msg-av{visibility:hidden}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--s3);background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;align-self:flex-end;margin-bottom:2px}
.msg-bbl{max-width:72%;padding:9px 13px 7px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;animation:bblIn .15s ease both}
@keyframes bblIn{from{opacity:0;transform:scale(.92) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg-row.inc .msg-bbl{background:var(--s3);border-bottom-right-radius:5px;color:var(--t1)}
.msg-row.out .msg-bbl{background:var(--acc);border-bottom-left-radius:5px;color:#fff}
.msg-row.inc.cont .msg-bbl{border-top-right-radius:5px;border-bottom-right-radius:18px}
.msg-row.out.cont .msg-bbl{border-top-left-radius:5px;border-bottom-left-radius:18px}
.msg-meta{font-size:10px;opacity:.6;margin-top:3px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:3px}
.msg-img{max-width:220px;border-radius:14px;display:block;cursor:pointer;margin-bottom:4px}
.dsep{text-align:center;font-size:11px;color:var(--t3);padding:8px 0;font-weight:500}
.chat-input-bar{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;background:rgba(0,0,0,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border2);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.chat-input-inner{flex:1;display:flex;align-items:flex-end;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:22px;padding:8px 12px;transition:border-color .2s}
.chat-input-inner:focus-within{border-color:rgba(224,64,251,.4)}
.chat-ta{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:15px;color:var(--t1);resize:none;max-height:100px;min-height:22px;line-height:1.4;align-self:center}
.chat-ta::placeholder{color:var(--t3)}
.chat-img-btn{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;flex-shrink:0}

<script>
// ═══════════════════════════════════════════════════
//  FIREBASE CONFIG
// ═══════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyAJq22IumpJkfeF104McYmVrIg20kyOuUA",
  authDomain:"o7chat.firebaseapp.com",
  databaseURL:"https://o7chat-default-rtdb.firebaseio.com",
  projectId:"o7chat",
  storageBucket:"o7chat.firebasestorage.app",
  messagingSenderId:"213934542014",
  appId:"1:213934542014:web:8b56f18e840d8c1e86a2ef"
});
const DB=firebase.database(), AU=firebase.auth();

// ═══════════════════════════════════════════════════
//  SECURITY HELPERS
// ═══════════════════════════════════════════════════
const san=s=>{if(typeof s!=='string')return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').substring(0,3000)};
const sanH=h=>(h||'').replace(/[^a-zA-Z0-9_]/g,'').toLowerCase().substring(0,20);
const valEmail=e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
const valH=h=>/^[a-zA-Z0-9_]{3,20}$/.test(h);

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let ME=null, CHAT_UID=null, CHAT_ID=null, SV_DATA=null, SV_IDX=0, SV_TMR=null;
let POST_IMG_DATA=null, STORY_IMG_DATA=null;
let LISTENERS={};
const COLORS=['#e040fb','#2196f3','#4caf50','#ff9800','#f44336','#00bcd4','#9c27b0','#ff5722','#607d8b','#795548'];
const gc=uid=>{if(!uid)return COLORS[0];let n=0;for(const c of uid)n+=c.charCodeAt(0);return COLORS[n%COLORS.length]};
const mkCID=(a,b)=>[a,b].sort().join('_');
const fmtT=ts=>{if(!ts)return'';const d=new Date(ts),n=new Date(),df=n-d;if(df<60000)return'الآن';if(df<3600000)return Math.floor(df/60000)+'د';if(df<86400000)return Math.floor(df/3600000)+'س';if(df<604800000)return Math.floor(df/86400000)+'ي';return d.getDate()+'/'+( d.getMonth()+1)};
const numFmt=n=>n>=1000?(n/1000).toFixed(1)+'K':n;
const rmL=k=>{if(LISTENERS[k])try{LISTENERS[k].off()}catch{}delete LISTENERS[k]};
const rmAllL=()=>Object.keys(LISTENERS).forEach(rmL);
let toastTmr;
function showToast(m,dur=2500){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),dur);}

// ═══════════════════════════════════════════════════
//  AUTH FLOW
// ═══════════════════════════════════════════════════
function swTab(m){
  const isIn=m==='in';
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('on',isIn?i===0:i===1));
  document.getElementById('f-in').classList.toggle('hide',!isIn);
  document.getElementById('f-up').classList.toggle('hide',isIn);
  clErr();
}
const shErr=m=>{const e=document.getElementById('af-err');e.textContent=m;e.classList.add('show')};
const clErr=()=>document.getElementById('af-err').classList.remove('show');

async function doLogin(){
  const em=document.getElementById('i-email').value.trim(), pw=document.getElementById('i-pass').value;
  clErr();
  if(!valEmail(em))return shErr('أدخل بريداً صحيحاً');
  if(!pw)return shErr('أدخل كلمة المرور');
  const b=document.getElementById('btn-lg');b.disabled=true;b.textContent='...';
  try{await AU.signInWithEmailAndPassword(em,pw);}
  catch(e){b.disabled=false;b.textContent='دخول';
    const M={'auth/user-not-found':'لا يوجد حساب بهذا البريد','auth/wrong-password':'كلمة المرور خاطئة','auth/too-many-requests':'محاولات كثيرة، انتظر قليلاً'};
    shErr(M[e.code]||e.message);}

async function doRegister(){

async function loadStories(){
  const bar=document.getElementById('stories-bar');
  // My story add button
  const addDiv=document.createElement('div');addDiv.className='story-item';
  addDiv.innerHTML=`<div class="story-add" onclick="document.getElementById('story-img-inp').click()">+</div><span class="story-nm">قصتك</span>`;
  bar.appendChild(addDiv);
  // Load following stories
  const folSn=await DB.ref('following/'+ME.uid).once('value');
  const fols=[];if(folSn.exists())folSn.forEach(c=>fols.push(c.key));fols.push(ME.uid);
  for(const uid of fols){
    const storySn=await DB.ref('stories').orderByChild('uid').equalTo(uid).limitToLast(10).once('value');
    const stories=[];storySn.forEach(c=>stories.push({id:c.key,...c.val()}));
    if(!stories.length)continue;
    const userSn=await DB.ref('users/'+uid).once('value');
    const u=userSn.val();if(!u)continue;
    const fresh=stories.filter(s=>Date.now()-s.time<86400000);
    if(!fresh.length)continue;
    const seen=fresh.every(s=>s.seenBy?.[ME.uid]);
    const item=document.createElement('div');item.className='story-item';
    const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(uid))}`:`background:${san(u.color||gc(uid))}`;
    item.innerHTML=`
      <div class="story-av${seen?' seen':''}">
        <div class="story-av-in" style="${avBg};background-size:cover;background-position:center">${u.photoURL?'':san((u.name||'?')[0])}</div>
      </div>
      <span class="story-nm">${san(u.name||'')}</span>`;
    item.onclick=()=>openStory(fresh,u);
    bar.appendChild(item);
  }
}

async function onStoryImg(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>3*1024*1024)return showToast('الصورة أكبر من 3MB');
  const r=new FileReader();
  r.onload=async e=>{
    const sid=DB.ref('stories').push().key;
    await DB.ref('stories/'+sid).set({uid:ME.uid,type:'image',img:e.target.result,time:firebase.database.ServerValue.TIMESTAMP});
    showToast('✅ تمت إضافة القصة');

    document.getElementById('stories-bar').innerHTML='';loadStories();

}

function openStory(stories,u){
  SV_DATA=stories;SV_IDX=0;
  const sv=document.getElementById('story-viewer');sv.classList.add('open');
  // Build progress bars
  const prog=document.getElementById('sv-progress');
  prog.innerHTML=stories.map((_,i)=>`<div class="sv-bar"><div class="sv-bar-fill" id="svb-${i}"></div></div>`).join('');
  showStoryCurrent(u);
}

function showStoryCurrent(u){
  if(!SV_DATA||SV_IDX>=SV_DATA.length){closeStory();return;}
  clearTimeout(SV_TMR);
  const s=SV_DATA[SV_IDX];
  const avEl=document.getElementById('sv-av');
  const avBg=u?.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u?.color||gc(s.uid))}`:`background:${san(u?.color||gc(s.uid))}`;
  avEl.style.cssText=`width:36px;height:36px;border-radius:50%;${avBg};background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff`;
  avEl.textContent=u?.photoURL?'':(u?.name||'?')[0];
  document.getElementById('sv-name').textContent=san(u?.name||'');
  document.getElementById('sv-time').textContent=fmtT(s.time);
  const img=document.getElementById('sv-img'),txt=document.getElementById('sv-text');
  if(s.type==='image'&&s.img){img.src=s.img;img.style.display='block';txt.style.display='none';}
  else{txt.textContent=s.text||'';txt.style.display='flex';img.style.display='none';}
  // Progress
  for(let i=0;i<SV_DATA.length;i++){
    const fill=document.getElementById('svb-'+i);if(!fill)continue;
    fill.style.transition='none';fill.style.transform=i<SV_IDX?'scaleX(1)':i===SV_IDX?'scaleX(0)':'scaleX(0)';
  }
  const fill=document.getElementById('svb-'+SV_IDX);
  if(fill){setTimeout(()=>{fill.style.transition='transform 5s linear';fill.style.transform='scaleX(1)';},50);}
  // Mark seen
  DB.ref('stories/'+s.id+'/seenBy/'+ME.uid).set(true).catch(()=>{});
  SV_TMR=setTimeout(svNext,5000);
}

function svNext(){SV_IDX++;if(SV_IDX>=SV_DATA.length){closeStory();return;}showStoryCurrent();}
function svPrev(){SV_IDX=Math.max(0,SV_IDX-1);showStoryCurrent();}
function closeStory(){clearTimeout(SV_TMR);document.getElementById('story-viewer').classList.remove('open');}
async function sendStoryReply(){
  const inp=document.getElementById('sv-reply-inp'),txt=inp.value.trim();
  if(!txt||!SV_DATA)return;
  const s=SV_DATA[SV_IDX];
  await openChatWith(s.uid);
  await sendMsgData({type:'text',text:'↩ رد على قصة: '+txt});
  inp.value='';showToast('✅ تم إرسال الرد');
}

async function loadFeed(){

async function toggleLike(postId,postUid){
  const ref=DB.ref('likes/'+postId+'/'+ME.uid);
  const sn=await ref.once('value');
  const btn=document.getElementById('like-btn-'+postId);
  const lcEl=document.getElementById('lc-'+postId);
  if(sn.val()){
    await ref.remove();
    await DB.ref('posts/'+postId+'/likesCount').transaction(n=>(n||1)-1);
    btn.classList.remove('liked');
    const cur=parseInt(lcEl.textContent)||1;lcEl.textContent=numFmt(Math.max(0,cur-1));
  }else{
    await ref.set(true);
    await DB.ref('posts/'+postId+'/likesCount').transaction(n=>(n||0)+1);
    btn.classList.add('liked');
    const cur=parseInt(lcEl.textContent)||0;lcEl.textContent=numFmt(cur+1);
    if(postUid!==ME.uid)await addNotif(postUid,'like',ME.uid,postId);
  }
}

let searchTmr=null;
async function doSearch(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.innerHTML='<div class="sec-title">مقترحون لك</div><div id="suggested-list"></div>';loadSuggested();return;}
  res.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">🔍 جارٍ البحث...</div>';
  clearTimeout(searchTmr);
  searchTmr=setTimeout(async()=>{
    const sn=await DB.ref('users').once('value');
    const found=[];
    sn.forEach(c=>{
      const u=c.val();if(!u||u.uid===ME.uid)return;
      const ql=q.toLowerCase();
      if((u.name||'').toLowerCase().includes(ql)||(u.handle||'').toLowerCase().includes(ql))found.push(u);
    });
    if(!found.length){res.innerHTML='<div class="empty-state"><div class="es-ico">🔍</div><h3>لا نتائج</h3><p>جرب اسماً آخر</p></div>';return;}
    res.innerHTML='';
    for(const u of found.slice(0,20))res.appendChild(await mkUserRow(u));
  },400);
}

async function loadSuggested(){
  const el=document.getElementById('suggested-list');if(!el)return;
  const sn=await DB.ref('users').limitToLast(20).once('value');
  const users=[];sn.forEach(c=>{const u=c.val();if(u&&u.uid!==ME.uid)users.push(u);});
  el.innerHTML='';
  for(const u of users.slice(0,10))el.appendChild(await mkUserRow(u));
}

async function mkUserRow(u){
  const isFollowing=(await DB.ref('following/'+ME.uid+'/'+u.uid).once('value')).val();
  const div=document.createElement('div');div.className='user-row';
  div.onclick=()=>openUserProfile(u.uid);
  const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(u.uid))};background-size:cover;background-position:center`:`background:${san(u.color||gc(u.uid))}`;
  div.innerHTML=`
    <div class="user-row-av" style="${avBg}">${u.photoURL?'':san((u.name||'?')[0])}</div>
    <div class="user-row-info">
      <div class="user-row-name">${san(u.name||'')}</div>
      <div class="user-row-handle">@${san(u.handle||'')}</div>
    </div>
    <div class="user-row-action">
      <button class="follow-btn ${isFollowing?'following':'follow'}" id="fb-${san(u.uid)}" onclick="event.stopPropagation();toggleFollow('${san(u.uid)}')">${isFollowing?'متابَع':'متابعة'}</button>
    </div>`;
  return div;
}

async function toggleFollow(uid){
  const ref=DB.ref('following/'+ME.uid+'/'+uid);
  const sn=await ref.once('value');
  const btn=document.getElementById('fb-'+uid);
  if(sn.val()){
    await ref.remove();
    await DB.ref('followers/'+uid+'/'+ME.uid).remove();
    await DB.ref('users/'+ME.uid+'/followingCount').transaction(n=>Math.max(0,(n||1)-1));
    await DB.ref('users/'+uid+'/followersCount').transaction(n=>Math.max(0,(n||1)-1));
    if(btn){btn.className='follow-btn follow';btn.textContent='متابعة';}
    showToast('إلغاء المتابعة');
  }else{
    await ref.set(true);
    await DB.ref('followers/'+uid+'/'+ME.uid).set(true);
    await DB.ref('users/'+ME.uid+'/followingCount').transaction(n=>(n||0)+1);
    await DB.ref('users/'+uid+'/followersCount').transaction(n=>(n||0)+1);
    if(btn){btn.className='follow-btn following';btn.textContent='متابَع';}
    await addNotif(uid,'follow',ME.uid);
    showToast('✅ متابعة');
  }
}

async function uploadAvatar(inp){
  const f=inp.files[0];if(!f)return;

  const r=new FileReader();
  r.onload=async e=>{
    ME.photoURL=e.target.result;
    await DB.ref('users/'+ME.uid).update({photoURL:ME.photoURL});
    renderMyProfile();showToast('✅ تم تحديث الصورة');
  };r.readAsDataURL(f);inp.value='';
}

async function saveProfile(){

function listenDMs(){
  rmL('dms');
  const ref=DB.ref('chats').orderByChild('members/'+ME.uid).equalTo(true);
  LISTENERS['dms']=ref;
  ref.on('value',async sn=>{
    const chats=[];sn.forEach(c=>chats.push({id:c.key,...c.val()}));
    chats.sort((a,b)=>(b.lastMsg?.time||0)-(a.lastMsg?.time||0));
    const dl=document.getElementById('dm-list');
    if(!chats.length){dl.innerHTML='<div class="empty-state"><div class="es-ico">💬</div><h3>لا توجد رسائل</h3><p>ابحث عن أصدقاء لبدء محادثة</p></div>';return;}
    dl.innerHTML='';
    for(const ch of chats){
      const oid=Object.keys(ch.members||{}).find(u=>u!==ME.uid);if(!oid)continue;
      const uSn=await DB.ref('users/'+oid).once('value');const u=uSn.val();if(!u)continue;
      const unread=ch.unread?.[ME.uid]||0;
      const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(oid))};background-size:cover;background-position:center`:`background:${san(u.color||gc(oid))}`;
      const row=document.createElement('div');row.className=`dm-row${unread>0?' unread':''}`;
      row.onclick=()=>openChatWith(oid);
      row.innerHTML=`
        <div class="dm-av" style="${avBg}">
          ${u.photoURL?'':san((u.name||'?')[0])}
          ${u.online?'<div class="dm-online"></div>':''}
        </div>
        <div class="dm-body">
          <div class="dm-name">${san(u.name||'')}</div>
          <div class="dm-prev">${san(ch.lastMsg?.text?ch.lastMsg.text.substring(0,40)+'...':'ابدأ المحادثة...')}</div>
        </div>
        <div class="dm-meta">
          <div class="dm-time">${ch.lastMsg?.time?san(fmtT(ch.lastMsg.time)):''}</div>
          ${unread>0?`<div class="dm-badge">${unread>99?'99+':unread}</div>`:''}
        </div>`;
      dl.appendChild(row);
    }
  });
}

async function openChatWith(uid){
  if(!uid||uid===ME.uid)return;
  const cid=mkCID(ME.uid,uid);
  const uSn=await DB.ref('users/'+uid).once('value');const u=uSn.val();if(!u)return;
  CHAT_UID=uid;CHAT_ID=cid;
  // Set chat header
  const av=document.getElementById('cv-av');
  const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(uid))};background-size:cover;background-position:center`:`background:${san(u.color||gc(uid))};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff`;
  av.style.cssText=`width:36px;height:36px;border-radius:50%;cursor:pointer;${avBg}`;
  av.textContent=u.photoURL?'':san((u.name||'?')[0]);
  document.getElementById('cv-name').textContent=san(u.name||'');
  // Online
  DB.ref('users/'+uid+'/online').on('value',s=>{
    const el=document.getElementById('cv-status');if(!el)return;
    el.textContent=s.val()?'متصل الآن':'غير متصل';el.className=s.val()?'chat-status':'chat-status off';
  });
  // Ensure chat exists
  const cRef=DB.ref('chats/'+cid);
  const cs=await cRef.once('value');
  if(!cs.exists())await cRef.set({id:cid,members:{[ME.uid]:true,[uid]:true},createdAt:firebase.database.ServerValue.TIMESTAMP});
  await DB.ref('chats/'+cid+'/unread/'+ME.uid).set(0);
  // Open view
  const cv=document.getElementById('chat-view');cv.classList.add('open');
  listenChatMsgs(cid);
  closeModal('nc-modal');closeModal('user-modal');
}

function closeChat(){
  document.getElementById('chat-view').classList.remove('open');
  rmL('chatmsgs');CHAT_UID=null;CHAT_ID=null;
}

function listenChatMsgs(cid){
  rmL('chatmsgs');
  const ref=DB.ref('messages/'+cid).orderByChild('time').limitToLast(100);
  LISTENERS['chatmsgs']=ref;let first=true;
  ref.on('value',async sn=>{
    const msgs=[];sn.forEach(c=>msgs.push({id:c.key,...c.val()}));
    const mw=document.getElementById('chat-msgs');mw.innerHTML='';
    if(!msgs.length)return;
    mw.appendChild(Object.assign(document.createElement('div'),{className:'dsep',textContent:'اليوم'}));
    let prev=null;
    for(const m of msgs){
      const isMe=m.from===ME.uid;
      const cont=m.from===prev;prev=m.from;
      const u=isMe?ME:(await DB.ref('users/'+m.from).once('value')).val()||{};
      const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(m.from))};background-size:cover;background-position:center`:`background:${san(u.color||gc(m.from))}`;
      const row=document.createElement('div');row.className=`msg-row ${isMe?'out':'inc'}${cont?' cont':''}`;
      const av=!isMe?`<div class="msg-av" style="${avBg};width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;align-self:flex-end;margin-bottom:2px">${u.photoURL||cont?'':san((u.name||'?')[0])}</div>`:'';
      let bblContent='';
      if(m.type==='image'&&m.img)bblContent=`<img class="msg-img" src="${san(m.img)}" onclick="document.getElementById('lbimg').src=this.src;document.getElementById('lbx').classList.add('open')">`;
      else bblContent=san(m.text||'').replace(/\n/g,'<br>');
      row.innerHTML=`${av}<div><div class="msg-bbl">${bblContent}<div class="msg-meta">${san(fmtT(m.time))}${isMe?`<span style="font-size:11px">${m.read?'✓✓':'✓'}</span>`:''}</div></div></div>`;
      mw.appendChild(row);
    }
    if(first){mw.scrollTop=mw.scrollHeight;first=false;}else mw.scrollTop=mw.scrollHeight;
    // Mark read
    DB.ref('chats/'+cid+'/unread/'+ME.uid).set(0);
    // Mark all their msgs as read
    msgs.filter(m=>m.from!==ME.uid&&!m.read).forEach(m=>DB.ref('messages/'+cid+'/'+m.id+'/read').set(true).catch(()=>{}));
  });
}

async function sendMsg(){
  const ta=document.getElementById('chat-ta'),txt=ta.value.trim();
  if(!txt||!CHAT_ID)return;
  ta.value='';ta.style.height='auto';
  await sendMsgData({type:'text',text:txt});
}

async function sendMsgData(data){
  if(!CHAT_ID||!CHAT_UID)return;
  const mid=DB.ref('messages/'+CHAT_ID).push().key;
  const msg={from:ME.uid,time:firebase.database.ServerValue.TIMESTAMP,read:false,...data};
  await DB.ref('messages/'+CHAT_ID+'/'+mid).set(msg);
  await DB.ref('chats/'+CHAT_ID).update({lastMsg:{text:data.text||(data.type==='image'?'📷 صورة':''),time:firebase.database.ServerValue.TIMESTAMP}});
  const ur=DB.ref('chats/'+CHAT_ID+'/unread/'+CHAT_UID);
  await ur.transaction(n=>(n||0)+1);
  // Notif
  await addNotif(CHAT_UID,'message',ME.uid,null,data.text||'📷 صورة');
}

function onChatImg(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>3*1024*1024)return showToast('الصورة أكبر من 3MB');
  const r=new FileReader();
  r.onload=async e=>{await sendMsgData({type:'image',img:e.target.result,text:'📷 صورة'});};
  r.readAsDataURL(f);inp.value='';
}

async function addNotif(toUid,type,fromUid,postId,text){
  if(!toUid||toUid===ME.uid)return;
  const nid=DB.ref('notifications/'+toUid).push().key;
  const notif={type,fromUid,postId:postId||'',text:text||'',time:firebase.database.ServerValue.TIMESTAMP,read:false};
  await DB.ref('notifications/'+toUid+'/'+nid).set(notif);
}

function listenNotifs(){
  rmL('notifs');
  const ref=DB.ref('notifications/'+ME.uid).orderByChild('time').limitToLast(30);
  LISTENERS['notifs']=ref;
  ref.on('value',async sn=>{
    const notifs=[];sn.forEach(c=>notifs.push({id:c.key,...c.val()}));
    notifs.sort((a,b)=>b.time-a.time);
    const unread=notifs.filter(n=>!n.read).length;
    const badge=document.getElementById('notif-badge');
    if(unread>0){badge.textContent=unread>9?'9+':unread;badge.style.display='flex';}else badge.style.display='none';
    const nl=document.getElementById('notifs-list');
    if(!notifs.length){nl.innerHTML='<div class="empty-state"><div class="es-ico">🔔</div><h3>لا توجد إشعارات</h3><p>ستظهر هنا عندما يتفاعل معك أحد</p></div>';return;}
    nl.innerHTML='';
    for(const n of notifs){
      const uSn=await DB.ref('users/'+n.fromUid).once('value');const u=uSn.val()||{};
      const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(n.fromUid))};background-size:cover;background-position:center`:`background:${san(u.color||gc(n.fromUid))}`;
      const msgs={'like':'أعجب بمنشورك','comment':'علّق على منشورك','follow':'بدأ بمتابعتك','message':'أرسل لك رسالة'};
      const item=document.createElement('div');item.className=`notif-item${n.read?'':' unread'}`;
      item.onclick=()=>{
        if(n.type==='message')openChatWith(n.fromUid);
        else if(n.type==='follow')openUserProfile(n.fromUid);
        else if(n.postId)openPost(n.postId);
      };
      item.innerHTML=`
        <div class="notif-av" style="${avBg}">${u.photoURL?'':san((u.name||'?')[0])}</div>
        <div class="notif-body">
          <div class="notif-text"><b>${san(u.name||'')}</b> ${msgs[n.type]||''}${n.text&&n.type==='comment'?`: "${san(n.text.substring(0,40))}"`:''}</div>
          <div class="notif-time">${san(fmtT(n.time))}</div>
        </div>`;
      nl.appendChild(item);
    }
  });
}

async function markNotifsRead(){
  const sn=await DB.ref('notifications/'+ME.uid).orderByChild('read').equalTo(false).once('value');
  const updates={};sn.forEach(c=>{updates[c.key+'/read']=true;});
  if(Object.keys(updates).length)await DB.ref('notifications/'+ME.uid).update(updates).catch(()=>{});
}

// ═══════════════════════════════════════════════════
//  NEW CHAT SEARCH
// ═══════════════════════════════════════════════════
let ncTmr=null;
async function ncSearch(q){
  const res=document.getElementById('nc-results');q=q.trim();
  if(!q){res.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">اكتب اسم المستخدم للبحث</div>';return;}
  clearTimeout(ncTmr);
  ncTmr=setTimeout(async()=>{
    const sn=await DB.ref('users').once('value');
    const found=[];
    sn.forEach(c=>{const u=c.val();if(!u||u.uid===ME.uid)return;const ql=q.toLowerCase();if((u.name||'').toLowerCase().includes(ql)||(u.handle||'').toLowerCase().includes(ql))found.push(u);});
    if(!found.length){res.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">لا نتائج</div>';return;}
    res.innerHTML='';
    found.slice(0,10).forEach(u=>{
      const avBg=u.photoURL?`background-image:url(${san(u.photoURL)});background-color:${san(u.color||gc(u.uid))};background-size:cover;background-position:center`:`background:${san(u.color||gc(u.uid))}`;
      const d=document.createElement('div');d.className='user-row';
      d.onclick=()=>{closeModal('nc-modal');openChatWith(u.uid);};
      d.innerHTML=`<div class="user-row-av" style="${avBg}">${u.photoURL?'':san((u.name||'?')[0])}</div><div class="user-row-info"><div class="user-row-name">${san(u.name||'')}</div><div class="user-row-handle">@${san(u.handle||'')}</div></div>`;
      res.appendChild(d);
    });
  },350);
}

const openModal=id=>document.getElementById(id).classList.add('show');
const closeModal=id=>document.getElementById(id).classList.remove('show');
const openSettings=()=>openModal('settings-modal');
const openNC=()=>{document.getElementById('nc-inp').value='';document.getElementById('nc-results').innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">اكتب اسم المستخدم للبحث</div>';openModal('nc-modal');}

// ═══════════════════════════════════════════════════
//  KEYBOARD / INPUT
// ═══════════════════════════════════════════════════
function onChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
const autoH=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';};

// Auth enter key
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.classList.contains('af-inp')){
    e.preventDefault();
    if(!document.getElementById('f-in').classList.contains('hide'))doLogin();else doRegister();
  }
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('show'));
    closeChat();closeStory();
  }
});
