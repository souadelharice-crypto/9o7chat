<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9O7CHAT - الإصدار المستقر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #0a0e27; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #e0e6ff; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; border-left: 1px solid rgba(0, 255, 136, 0.1); background: rgba(26, 31, 58, 0.95); z-index: 50; }
        .room-item { padding: 12px; margin: 5px 10px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; text-align: right; }
        .room-item:hover, .room-item.active { background: rgba(0, 255, 136, 0.2); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); }
        .msg.own { align-self: flex-start; background: rgba(0, 255, 136, 0.1); border-right: 3px solid var(--primary); }
        .status-online { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body class="flex">
    <div class="sidebar flex flex-col">
        <div class="p-6 border-b border-green-900/30">
            <h1 class="text-2xl font-bold text-green-400">9O7CHAT 💀</h1>
            <div id="status" class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">OFFLINE</div>
        </div>
        <div class="flex-1 py-4 overflow-y-auto" id="roomsList">
            <div class="room-item" onclick="selectRoom('general', 'الدردشة العامة 💬')">الدردشة العامة 💬</div>
            <div class="room-item" onclick="selectRoom('hacking', 'Hacking Zone 🛡️')">Hacking Zone 🛡️</div>
            <div class="room-item" onclick="selectRoom('crypto', 'Crypto News ₿')">Crypto News ₿</div>
            <div class="room-item" onclick="selectRoom('security', 'Security Lab 🔐')">Security Lab 🔐</div>
            <div class="room-item" onclick="selectRoom('dev', 'Dev & Code 💻')">Dev & Code 💻</div>
        </div>
        <button id="authBtn" class="m-4 p-3 bg-green-500 text-black font-bold rounded hover:scale-105 transition">دخول السيرفر</button>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="p-4 border-b border-green-900/30 flex justify-between items-center bg-black/40">
            <h3 id="roomTitle" class="font-bold text-green-400">اختر قناة</h3>
            <span class="text-[10px] text-gray-500">ID: <span id="userIdDisplay" class="text-green-500">---</span></span>
        </div>
        <div id="messagesContainer" class="messages-container">
            <div class="text-center text-gray-600 mt-20 text-sm">سجل دخولك ثم اختر قناة لبدء الدردشة</div>
        </div>
        <div class="p-4 border-t border-green-900/30 bg-black/50 flex gap-3">
            <input id="msgInput" type="text" placeholder="اكتب رسالة..." class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-green-400" disabled>
            <button id="sendBtn" class="px-6 py-2 bg-green-500 text-black font-bold rounded-lg disabled:opacity-30" disabled>إرسال</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBj19ByaidBYTANgXtus-m8NBH1pyCps44",
            authDomain: "o7chat-56520.firebaseapp.com",
            projectId: "o7chat-56520",
            storageBucket: "o7chat-56520.firebasestorage.app",
            messagingSenderId: "654634327834",
            appId: "1:654634327834:web:5e3c9700be11fbf6ed96a3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentUser, currentRoom, msgUnsub;

        // التحقق من حالة الدخول
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('status').textContent = 'ONLINE - SECURE ✅';
                document.getElementById('status').classList.add('status-online');
                document.getElementById('authBtn').textContent = 'خروج';
                document.getElementById('userIdDisplay').textContent = user.uid.slice(0,6);
            } else {
                document.getElementById('status').textContent = 'OFFLINE';
                document.getElementById('status').classList.remove('status-online');
                document.getElementById('authBtn').textContent = 'دخول السيرفر';
                document.getElementById('userIdDisplay').textContent = '---';
                document.getElementById('msgInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
            }
        });

        function selectRoom(id, name) {
            if (!currentUser) {
                alert("يرجى الضغط على زر 'دخول السيرفر' أولاً!");
                return;
            }
            currentRoom = id;
            document.getElementById('roomTitle').textContent = name;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            // تمييز القناة المختارة
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.remove('active');
                if(el.textContent.includes(name.split(' ')[0])) el.classList.add('active');
            });

            loadMessages();
        }

        function loadMessages() {
            if (msgUnsub) msgUnsub();
            msgUnsub = db.collection('rooms').doc(currentRoom).collection('messages')
                .orderBy('timestamp', 'asc').limit(50).onSnapshot(snap => {
                    const cont = document.getElementById('messagesContainer');
                    cont.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isOwn = m.userId === currentUser?.uid;
                        cont.innerHTML += `<div class="msg ${isOwn ? 'own' : ''}">
                            <div class="text-[9px] text-green-500 mb-1 font-bold">${m.userName}</div>
                            <div class="text-sm">${m.text}</div>
                        </div>`;
                    });
                    cont.scrollTop = cont.scrollHeight;
                });
        }

        async function send() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim() || !currentRoom) return;
            const text = input.value;
            input.value = '';
            
            await db.collection('rooms').doc(currentRoom).collection('messages').add({
                text: text,
                userId: currentUser.uid,
                userName: `Anon_${currentUser.uid.slice(0,4)}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                room: currentRoom
            });
        }

        document.getElementById('authBtn').onclick = () => {
            if (currentUser) auth.signOut();
            else auth.signInAnonymously();
        };
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && send();
    </script>
</body>
</html>
