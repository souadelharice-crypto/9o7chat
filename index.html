<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9O7CHAT - الإصدار المستقر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #0a0e27; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #e0e6ff; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; border-left: 1px solid rgba(0, 255, 136, 0.1); background: rgba(26, 31, 58, 0.9); backdrop-filter: blur(20px); z-index: 50; }
        .room-item { padding: 12px; margin: 4px 8px; background: rgba(0, 255, 136, 0.03); border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; text-align: right; }
        .room-item:hover, .room-item.active { background: rgba(0, 255, 136, 0.15); border-color: var(--primary); color: var(--primary); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); position: relative; }
        .msg.own { align-self: flex-start; background: rgba(0, 255, 136, 0.1); border-right: 3px solid var(--primary); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body class="flex">
    <div class="sidebar flex flex-col">
        <div class="p-6 border-b border-green-900/30">
            <h1 class="text-2xl font-bold text-green-400 tracking-tighter">9O7CHAT 💀</h1>
            <div id="status" class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">جاري التحقق...</div>
        </div>
        <div class="flex-1 py-4 overflow-y-auto" id="roomsList">
            </div>
        <button id="authBtn" class="m-4 p-3 bg-green-500 text-black font-bold rounded shadow-[0_0_15px_rgba(0,255,136,0.3)] hover:scale-105 transition">دخول السيرفر</button>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="p-4 border-b border-green-900/30 flex justify-between items-center bg-black/40">
            <h3 id="roomTitle" class="font-bold text-green-400 font-mono italic">إختر قناة</h3>
            <div id="userBadge" class="px-2 py-1 bg-green-900/30 rounded text-[10px] text-green-400 border border-green-500/20">GUEST</div>
        </div>
        <div id="messagesContainer" class="messages-container"></div>
        <div class="p-4 border-t border-green-900/30 bg-black/50 flex gap-3">
            <input id="msgInput" type="text" placeholder="أرسل رسالة مشفرة..." class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-green-400 transition-all" disabled>
            <button id="sendBtn" class="px-6 py-2 bg-green-500 text-black font-bold rounded-lg disabled:opacity-30" disabled>إرسال</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBj19ByaidBYTANgXtus-m8NBH1pyCps44",
            authDomain: "o7chat-56520.firebaseapp.com",
            projectId: "o7chat-56520",
            storageBucket: "o7chat-56520.firebasestorage.app",
            messagingSenderId: "654634327834",
            appId: "1:654634327834:web:5e3c9700be11fbf6ed96a3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentUser, currentRoom, msgUnsub;

        // 1. القنوات المدمجة
        const defaultRooms = [
            { id: 'general', name: 'الدردشة العامة 💬' },
            { id: 'hacking', name: 'Hacking Zone 🛡️' },
            { id: 'linux', name: 'Linux Masters 🐧' },
            { id: 'security', name: 'Security Lab 🔐' },
            { id: 'dev', name: 'Dev & Code 💻' }
        ];

        async function init() {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                document.getElementById('authBtn').textContent = user ? 'خروج من السيرفر' : 'دخول السيرفر';
                document.getElementById('status').textContent = user ? 'ONLINE - SECURE' : 'OFFLINE - SIGN IN';
                document.getElementById('userBadge').textContent = user ? `ID: ${user.uid.slice(0,6)}` : 'GUEST';
                if(user) syncRooms();
            });
            renderRooms();
        }

        // 2. مزامنة الغرف مع Firebase لضمان وجودها
        async function syncRooms() {
            for (const r of defaultRooms) {
                await db.collection('rooms').doc(r.id).set({ name: r.name }, { merge: true });
            }
        }

        // 3. عرض الغرف بشكل ثابت
        function renderRooms() {
            const list = document.getElementById('roomsList');
            list.innerHTML = '';
            defaultRooms.forEach(r => {
                const el = document.createElement('div');
                el.className = `room-item ${currentRoom === r.id ? 'active' : ''}`;
                el.id = `room-${r.id}`;
                el.textContent = r.name;
                el.onclick = () => selectRoom(r.id, r.name);
                list.appendChild(el);
            });
        }

        function selectRoom(id, name) {
            currentRoom = id;
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`room-${id}`).classList.add('active');
            document.getElementById('roomTitle').textContent = name;
            document.getElementById('msgInput').disabled = !currentUser;
            document.getElementById('sendBtn').disabled = !currentUser;
            loadMessages();
        }

        function loadMessages() {
            if (msgUnsub) msgUnsub();
            msgUnsub = db.collection('rooms').doc(currentRoom).collection('messages')
                .orderBy('timestamp', 'asc').limit(100).onSnapshot(snap => {
                    const cont = document.getElementById('messagesContainer');
                    cont.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isOwn = m.userId === currentUser?.uid;
                        cont.innerHTML += `
                            <div class="msg ${isOwn ? 'own' : ''}">
                                <div class="text-[9px] text-green-500/60 mb-1 font-bold">${m.userName}</div>
                                <div class="text-sm">${m.text}</div>
                            </div>`;
                    });
                    cont.scrollTop = cont.scrollHeight;
                });
        }

        async function send() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim() || !currentUser) return;
            const text = input.value;
            input.value = '';
            try {
                await db.collection('rooms').doc(currentRoom).collection('messages').add({
                    text: text,
                    userId: currentUser.uid,
                    userName: `User_${currentUser.uid.slice(0,4)}`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.error("Error sending:", e); }
        }

        document.getElementById('authBtn').onclick = () => currentUser ? auth.signOut() : auth.signInAnonymously();
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && send();

        init();
    </script>
</body>
</html>
