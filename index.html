<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9O7CHAT | GLOBAL NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --admin: #ff3e3e; --bg: #05070a; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: #e0e6ff; height: 100vh; overflow: hidden; }
        
        /* Responsive Grid */
        .app-container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        .sidebar { 
            width: 100%; height: auto; max-height: 30vh; border-bottom: 1px solid rgba(0, 255, 136, 0.1); 
            background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(10px); z-index: 50; overflow-y: auto;
        }
        @media (min-width: 768px) { .sidebar { width: 320px; height: 100vh; max-height: none; border-bottom: none; border-right: 1px solid rgba(0, 255, 136, 0.1); } }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #0a1018 0%, #05070a 100%); position: relative; }

        /* Smooth Messages */
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 90%; padding: 12px; border-radius: 18px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); word-wrap: break-word; }
        @media (min-width: 768px) { .msg { max-width: 70%; } }
        .msg.own { align-self: flex-end; background: rgba(0, 255, 136, 0.05); border-bottom-right-radius: 2px; border-right: 2px solid var(--primary); }
        
        /* Minimal Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 136, 0.2); border-radius: 10px; }

        .neon-text { text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .btn-glow { transition: 0.3s; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(0, 255, 136, 0.3); transform: translateY(-1px); }
    </style>
</head>
<body class="app-container">

    <div class="md:hidden p-4 bg-black/50 border-b border-green-500/20 flex justify-between items-center">
        <h1 class="text-xl font-bold text-green-400 italic neon-text">9O7CHAT</h1>
        <button onclick="toggleSidebar()" class="p-2 bg-green-500/10 rounded-lg text-green-400">☰</button>
    </div>

    <div id="sidebar" class="sidebar hidden md:flex flex-col">
        <div class="p-6 hidden md:block">
            <h1 class="text-3xl font-black text-green-400 italic tracking-tighter neon-text">9O7CHAT</h1>
            <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest font-bold">Encrypted Global Node</p>
        </div>

        <div class="p-4">
            <div class="text-[10px] text-green-500/50 mb-2 font-bold uppercase tracking-widest px-2">Channels</div>
            <div id="roomsList" class="space-y-1">
                </div>
        </div>

        <div class="mt-auto p-4 space-y-2 bg-black/20">
            <button onclick="createPrivateRoom()" class="w-full p-3 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-xl text-xs font-bold hover:bg-blue-500/20 transition">🔒 Private Node</button>
            <a href="https://t.me/zv88v" target="_blank" class="block w-full p-3 bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 rounded-xl text-xs font-bold text-center">👑 VIP Upgrade</a>
            <div class="flex gap-2">
                <button onclick="activateAdmin()" class="flex-1 p-2 text-[10px] text-red-500/50 hover:text-red-500 border border-red-500/20 rounded-lg">Admin</button>
                <button id="authBtn" class="flex-[2] py-2 bg-green-500 text-black font-bold rounded-lg text-xs btn-glow">Connect</button>
            </div>
        </div>
    </div>

    <main class="chat-area">
        <header class="p-4 md:p-6 border-b border-white/5 flex justify-between items-center bg-black/20 backdrop-blur-md">
            <div>
                <h2 id="roomTitle" class="text-lg md:text-xl font-bold text-white">Loading...</h2>
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span id="userStatus" class="text-[9px] text-gray-400 uppercase tracking-widest font-bold">Node Connected</span>
                </div>
            </div>
            <div class="hidden sm:block text-right">
                <span class="text-[9px] text-gray-500 block">ENCRYPTION: AES-256</span>
                <span id="userIdDisplay" class="text-xs font-bold text-green-500 tracking-tighter">---</span>
            </div>
        </header>

        <div id="messagesContainer" class="messages-container">
            </div>

        <div id="uploadBar" class="h-1 bg-green-500 w-0 transition-all shadow-[0_0_10px_#00ff88]"></div>

        <footer class="p-4 md:p-6 bg-black/40 border-t border-white/5">
            <div class="flex gap-2 md:gap-4 items-center max-w-5xl mx-auto w-full">
                <label class="p-3 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                    📎 <input type="file" id="fileInput" class="hidden" onchange="uploadFile()">
                </label>
                <input id="msgInput" type="text" placeholder="Secure message..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl p-3 md:p-4 outline-none focus:border-green-500 transition text-sm md:text-base" disabled>
                <button id="sendBtn" class="w-12 h-12 md:w-14 md:h-14 bg-green-500 text-black rounded-2xl font-bold flex items-center justify-center hover:scale-105 active:scale-95 transition btn-glow">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBj19ByaidBYTANgXtus-m8NBH1pyCps44",
            authDomain: "o7chat-56520.firebaseapp.com",
            projectId: "o7chat-56520",
            storageBucket: "o7chat-56520.appspot.com",
            messagingSenderId: "654634327834",
            appId: "1:654634327834:web:5e3c9700be11fbf6ed96a3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();
        
        let currentUser, currentRoom, msgUnsub;
        let isAdmin = localStorage.getItem('9o7_admin') === 'true';

        // Initialization
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('userIdDisplay').textContent = `ID: ${user.uid.slice(0,8)}`;
                document.getElementById('authBtn').textContent = 'Disconnect';
                // AUTO ENTER GLOBAL LOBBY
                selectRoom('global', 'Global Lobby');
                listenToRooms();
            } else {
                document.getElementById('authBtn').textContent = 'Connect';
            }
        });

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
        }

        function activateAdmin() {
            if(prompt("ENTER MASTER CODE:") === "9o79o7admin") {
                isAdmin = true;
                localStorage.setItem('9o7_admin', 'true');
                location.reload();
            }
        }

        function listenToRooms() {
            db.collection('rooms').orderBy('timestamp', 'desc').onSnapshot(snap => {
                const list = document.getElementById('roomsList');
                list.innerHTML = `
                    <div class="p-3 mb-1 rounded-xl cursor-pointer transition ${currentRoom === 'global' ? 'bg-green-500/20 border border-green-500/30 text-green-400' : 'hover:bg-white/5'}" 
                         onclick="selectRoom('global', 'Global Lobby')">🌍 Global Lobby</div>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    const activeClass = currentRoom === doc.id ? 'bg-green-500/20 border border-green-500/30 text-green-400' : 'hover:bg-white/5';
                    list.innerHTML += `<div class="p-3 mb-1 rounded-xl cursor-pointer transition ${activeClass}" 
                                       onclick="handleRoomClick('${doc.id}', '${d.name}', '${d.password}')">${d.name}</div>`;
                });
            });
        }

        function handleRoomClick(id, name, pass) {
            if(pass && prompt("PIN REQUIRED:") !== pass) return alert("Wrong PIN");
            selectRoom(id, name);
        }

        function selectRoom(id, name) {
            currentRoom = id;
            document.getElementById('roomTitle').textContent = name;
            document.getElementById('msgInput').disabled = false;
            // On mobile, close sidebar after selecting room
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
            loadMessages();
        }

        function loadMessages() {
            if (msgUnsub) msgUnsub();
            msgUnsub = db.collection('rooms').doc(currentRoom).collection('messages')
                .orderBy('timestamp', 'asc').limit(50).onSnapshot(snap => {
                    const cont = document.getElementById('messagesContainer');
                    cont.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMe = m.userId === currentUser.uid;
                        cont.innerHTML += `
                            <div class="msg ${isMe ? 'own' : ''}">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-bold ${m.rank === 'ADMIN' ? 'text-red-500' : 'text-green-400'}">
                                        ${m.rank === 'ADMIN' ? '💀 ADMIN' : '👤 USER'} ${m.userName}
                                    </span>
                                </div>
                                <div class="text-sm md:text-base leading-snug">${m.text}</div>
                                ${m.fileUrl ? `<a href="${m.fileUrl}" target="_blank" class="block mt-2 text-[10px] text-blue-400 underline italic">Attachment Download</a>` : ''}
                                ${isAdmin ? `<button onclick="deleteMsg('${doc.id}')" class="text-[8px] text-red-500 block mt-2">TERMINATE</button>` : ''}
                            </div>`;
                    });
                    cont.scrollTop = cont.scrollHeight;
                });
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !currentRoom) return;
            const text = input.value;
            input.value = '';
            await db.collection('rooms').doc(currentRoom).collection('messages').add({
                text: text, userId: currentUser.uid,
                userName: isAdmin ? "BLACK_OWNER" : `User_${currentUser.uid.slice(0,4)}`,
                rank: isAdmin ? "ADMIN" : "USER",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const ref = storage.ref(`OMNI/${Date.now()}_${file.name}`);
            const task = ref.put(file);
            task.on('state_changed', s => {
                document.getElementById('uploadBar').style.width = (s.bytesTransferred/s.totalBytes)*100 + '%';
            }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                document.getElementById('uploadBar').style.width = '0';
                await db.collection('rooms').doc(currentRoom).collection('messages').add({
                    text: `Shared a file: ${file.name}`, fileUrl: url,
                    userId: currentUser.uid, userName: isAdmin ? "BLACK_OWNER" : `User_${currentUser.uid.slice(0,4)}`,
                    rank: isAdmin ? "ADMIN" : "USER", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
        }

        async function createPrivateRoom() {
            const n = prompt("Room Name:");
            const p = prompt("Set PIN:");
            if(n && p) await db.collection('rooms').add({ name: `🔐 ${n}`, password: p, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        document.getElementById('authBtn').onclick = () => currentUser ? auth.signOut() : auth.signInAnonymously();
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && sendMessage();
    </script>
</body>
</html>
